<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="DYGIndumentaria — Gestión profesional de tu tienda de ropa. Inventario, ventas, clientas y fiados.">
  <meta name="theme-color" content="#0A0810">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>DYGIndumentaria — Gestión de Tienda</title>
  <script>
    if (localStorage.getItem('dyg_theme') === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  </script>

  <link rel="stylesheet" href="main.css">
  <link rel="stylesheet" href="splash.css">
  <link rel="stylesheet" href="layout.css">
  <link rel="stylesheet" href="components.css">
  <link rel="stylesheet" href="pages.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- SPLASH SCREEN -->
<div id="splash-screen">
  <canvas id="splash-canvas"></canvas>
  <div class="splash-glow"></div>

  <div class="splash-content">
    <div class="splash-logo-wrap">
      <div class="splash-ring-outer"></div>
      <div class="splash-ring-inner"></div>
      <img class="splash-logo-img" src="logo.png" alt="DYG Indumentaria">
    </div>

    <div class="splash-brand">
      <div class="splash-brand-name">DYGIndumentaria</div>
      <div class="splash-brand-tagline">Sistema de Gestión Profesional</div>
    </div>

    <div class="splash-divider">
      <div class="splash-divider-line"></div>
      <div class="splash-divider-diamond"></div>
      <div class="splash-divider-line"></div>
    </div>

    <div class="splash-loader">
      <div class="splash-loader-track">
        <div class="splash-loader-fill" id="splash-fill"></div>
      </div>
      <div class="splash-loader-pct" id="splash-pct">0%</div>
    </div>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div id="toast-container"></div>

<!-- APP SHELL -->
<div id="app">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-inner">
        <div class="sidebar-logo">
          <img src="logo.png" alt="DYG">
        </div>
        <div class="sidebar-brand-text">
          <div class="sidebar-brand-name">DYGIndumentaria</div>
          <div class="sidebar-brand-sub">Gestión</div>
        </div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Principal</div>

      <div class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Dashboard</span>
      </div>

      <div class="nav-item" data-page="catalog" onclick="navigate('catalog')">
        <span class="nav-icon">👗</span>
        <span class="nav-label">Catálogo</span>
      </div>

      <div class="nav-section-label">Comercial</div>

      <div class="nav-item" data-page="sales" onclick="navigate('sales')">
        <span class="nav-icon">🛍️</span>
        <span class="nav-label">Ventas</span>
      </div>

      <div class="nav-item" data-page="clients" onclick="navigate('clients')">
        <span class="nav-icon">👩</span>
        <span class="nav-label">Clientas</span>
      </div>

      <div class="nav-item" data-page="debts" onclick="navigate('debts')">
        <span class="nav-icon">💳</span>
        <span class="nav-label">Fiados</span>
        <span class="nav-badge" id="debts-nav-badge" style="display:none">0</span>
      </div>

      <div class="nav-item" data-page="cash" onclick="navigate('cash')">
        <span class="nav-icon">💵</span>
        <span class="nav-label">Caja</span>
      </div>

      <div class="nav-section-label">Análisis</div>

      <div class="nav-item" data-page="reports" onclick="navigate('reports')">
        <span class="nav-icon">📈</span>
        <span class="nav-label">Reportes</span>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-footer-info">
        <div class="sidebar-footer-dot"></div>
        <div class="sidebar-footer-text">Sistema activo — DYGIndumentaria</div>
      </div>
      <button class="btn-cache-clear" onclick="confirmClearCache()">
        🗑️ Borrar caché / Reiniciar datos
      </button>
    </div>
  </aside>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- MAIN AREA -->
  <div class="main-area">

    <!-- Topbar -->
    <header class="topbar">
      <button class="menu-toggle topbar-btn" onclick="openSidebar()">☰</button>

      <div class="topbar-title">
        <div class="topbar-page-name" id="topbar-page-name">Dashboard</div>
        <div class="topbar-page-sub"  id="topbar-page-sub">Resumen general</div>
      </div>

      <div class="topbar-actions">
        <div class="topbar-search" style="position:relative">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="Buscar clientas, prendas..."
                 id="global-search" autocomplete="off">
          <div id="search-dropdown" class="search-dropdown"></div>
        </div>

        <button class="topbar-btn theme-toggle-btn" title="Alternar Tema" onclick="toggleTheme()">🌙</button>
        <button class="topbar-btn" title="Nueva venta" onclick="navigate('sales');openAddSaleModal()">🛍️</button>
        <button class="topbar-btn" title="Nueva clienta" onclick="navigate('clients');openAddClientModal()">👩</button>
        <button class="topbar-btn" title="Reportes" onclick="navigate('reports')">📈</button>
      </div>
    </header>

    <!-- Page Content -->
    <main class="page-content">
      <div class="page active" id="page-dashboard"></div>
      <div class="page"        id="page-catalog"></div>
      <div class="page"        id="page-sales"></div>
      <div class="page"        id="page-clients"></div>
      <div class="page"        id="page-debts"></div>
      <div class="page"        id="page-cash"></div>
      <div class="page"        id="page-reports"></div>
    </main>
  </div>

</div><!-- #app -->

<!-- BOTTOM NAV (Mobile) -->
<nav class="bottom-nav" id="bottom-nav">
  <div class="bottom-nav-inner">
    <div class="bottom-nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
      <span class="bn-icon">📊</span>
      <span class="bn-label">Inicio</span>
    </div>
    <div class="bottom-nav-item" data-page="catalog" onclick="navigate('catalog')">
      <span class="bn-icon">👗</span>
      <span class="bn-label">Catálogo</span>
    </div>
    <div class="bottom-nav-item" data-page="sales" onclick="navigate('sales')">
      <span class="bn-icon">🛍️</span>
      <span class="bn-label">Ventas</span>
    </div>
    <div class="bottom-nav-item" data-page="debts" onclick="navigate('debts')">
      <span class="bn-icon">💳</span>
      <span class="bn-label">Fiados</span>
      <span class="bn-badge" id="debts-bottom-badge" style="display:none">0</span>
    </div>
    <div class="bottom-nav-item" data-page="clients" onclick="navigate('clients')">
      <span class="bn-icon">👩</span>
      <span class="bn-label">Clientas</span>
    </div>
  </div>
</nav>

<!-- SCRIPTS -->
<script src="data.js"></script>
<script src="utils.js"></script>
<script src="splash.js"></script>
<script src="dashboard.js"></script>
<script src="catalog.js"></script>
<script src="sales.js"></script>
<script src="clients.js"></script>
<script src="debts.js"></script>
<script src="reports.js"></script>
<script src="cash.js"></script>
<script src="router.js"></script>

<script>
  // ── Bootstrap ────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    store.load();
    initSplash();

    const observer = new MutationObserver(() => {
      const app = document.getElementById('app');
      if (app && app.classList.contains('app-ready')) {
        observer.disconnect();
        setTimeout(() => {
          navigate('dashboard');
          updateDebtBadge();
        }, 100);
      }
    });

    observer.observe(document.getElementById('app'), {
      attributes: true,
      attributeFilter: ['class'],
    });
  });

  // ── Clear Cache ──────────────────────────
  async function confirmClearCache() {
    const ok = await confirm(
      '¿Borrar todos los datos y volver a los datos de ejemplo?\n\nEsta acción no se puede deshacer.',
      { title: '🗑️ Borrar caché', icon: '⚠️', danger: true }
    );
    if (!ok) return;
    store.clearAllData();
    toast('Caché borrada. Reiniciando…', 'info');
    setTimeout(() => location.reload(), 800);
  }
</script>

</body>
</html>
